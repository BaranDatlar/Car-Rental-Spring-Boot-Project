spring.application.name=rentACar
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate

spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
spring.datasource.username=rentacar
spring.datasource.password=rentacar
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.properties.javax.persistence.validation.mode = none

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Logging
logging.level.root=INFO
logging.level.com.baran.rentacar=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Pattern (correlation id'li)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{correlationId:-}] %logger{36} - %msg%n

jwt.secret=ThisIsAVerySecretKeyForJwtSigningMustBeAtLeast256BitsLong12345
jwt.expiration=3600000

logging.level.org.springframework.security=DEBUG